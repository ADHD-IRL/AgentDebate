<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AgentDebate — Analyst Dashboard</title>
<meta name="viewport" content="width=1440" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --wr-bg-primary: #0D1B2A;
    --wr-bg-secondary: #121E2D;
    --wr-bg-card: #1A2844;
    --wr-bg-hover: #1F3060;
    --wr-border: #2A3F5A;
    --wr-border-strong: #3A5075;
    --wr-text-primary: #E8EDF5;
    --wr-text-secondary: #8A9BB5;
    --wr-text-muted: #546E7A;
    --wr-amber: #F0A500;
    --wr-critical: #C0392B;
    --wr-high: #D68910;
    --wr-medium: #2E86AB;
    --wr-low: #27AE60;
    --wr-purple: #7B2D8B;
  }
  html, body, #root { background: var(--wr-bg-primary); color: var(--wr-text-primary); }
  body { font-family: 'Inter', system-ui, sans-serif; font-feature-settings: "cv02","cv03","cv04","cv11"; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--wr-bg-secondary); }
  ::-webkit-scrollbar-thumb { background: var(--wr-border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--wr-text-muted); }

  /* diagonal stripe for no-data placeholders */
  .stripe {
    background-image: repeating-linear-gradient(45deg, rgba(138,155,181,0.04) 0 6px, transparent 6px 12px);
  }

  /* animated pulse dot */
  @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .pulse-dot { animation: pulseDot 1.6s ease-in-out infinite; }

  /* annotation callouts */
  .annot {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.04em;
    color: #F0A500;
    background: rgba(240,165,0,0.08);
    border: 1px dashed rgba(240,165,0,0.45);
    padding: 4px 8px;
    border-radius: 3px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 20;
  }
  .annot::before {
    content: "";
    position: absolute;
    background: rgba(240,165,0,0.45);
  }
  body.hide-annot .annot { display: none; }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react" src="./src/data.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./src/atoms.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./src/sidebar.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./src/kpis.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./src/priority.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./src/matrix.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./src/feed.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./src/coverage.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./src/app.jsx"></script>
</body>
</html>
