<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AgentDebate — Dashboard</title>
<meta name="viewport" content="width=1440" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --wr-bg-primary: #0D1B2A;
    --wr-bg-secondary: #121E2D;
    --wr-bg-card: #1A2844;
    --wr-bg-hover: #1F3060;
    --wr-border: #2A3F5A;
    --wr-border-strong: #3A5075;
    --wr-text-primary: #E8EDF5;
    --wr-text-secondary: #8A9BB5;
    --wr-text-muted: #546E7A;
    --wr-amber: #F0A500;
    --wr-critical: #C0392B;
    --wr-high: #D68910;
    --wr-medium: #2E86AB;
    --wr-low: #27AE60;
    --wr-purple: #7B2D8B;
  }
  html, body, #root { background: var(--wr-bg-primary); color: var(--wr-text-primary); }
  body { font-family: 'Inter', system-ui, sans-serif; font-feature-settings: "cv02","cv03","cv04","cv11"; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--wr-bg-secondary); }
  ::-webkit-scrollbar-thumb { background: var(--wr-border); border-radius: 3px; }

  @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .pulse-dot { animation: pulseDot 1.6s ease-in-out infinite; }

  .row-link { transition: background-color 140ms ease; }
  .row-link:hover { background-color: rgba(138,155,181,0.05); }
  .row-link:hover .row-chev { color: var(--wr-amber); transform: translateX(2px); }
  .row-chev { transition: all 140ms ease; }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react" src="./src/data.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./src/atoms.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./src/sidebar.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./tweaks-panel.jsx"></script>

  <script type="text/babel" data-presets="env,react">

const { useState, useMemo, useEffect } = React;

// ── Tweak defaults (host rewrites this block on save) ───────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#F0A500",
  "density": "regular",
  "pipelineSizing": "equal",
  "showScenarios": true,
  "showLivePulse": true,
  "compactKpis": false
}/*EDITMODE-END*/;

// ── Events: in-progress + completed sessions/reviews, sorted by date ──────
const NOW = new Date('2026-05-19T09:30:00Z');

const EVENTS = [
// TODAY
{ id: 'e1', date: '2026-05-19T10:00:00Z', title: 'APT29 Q2 earnings window — Round 2 review', scenario: 'APT29 targeting Q2 earnings', status: 'round2', severity: 'CRITICAL', findings: 9, critical: 2, owner: 'Ava.Cyber', live: false },
{ id: 'e2', date: '2026-05-19T11:30:00Z', title: 'MSP ransomware pivot — adjudication', scenario: 'Ransomware via MSP pivot', status: 'round2', severity: 'CRITICAL', findings: 6, critical: 3, owner: 'Kai.Cyber', live: true },
{ id: 'e3', date: '2026-05-19T14:00:00Z', title: 'Pre-earnings tabletop kickoff', scenario: 'APT29 targeting Q2 earnings', status: 'pending', severity: 'HIGH', findings: 0, critical: 0, owner: 'Ava.Cyber', live: false },
{ id: 'e4', date: '2026-05-19T16:30:00Z', title: 'Insider domain — agent assignment review', scenario: 'Insider exfiltration — R&D', status: 'review', severity: 'HIGH', findings: 0, critical: 0, owner: 'Mei.Supply', live: false },

// UPCOMING
{ id: 'e5', date: '2026-05-20T09:00:00Z', title: 'Baltic infra — April review (re-debate)', scenario: 'Baltic critical-infrastructure', status: 'pending', severity: 'HIGH', findings: 4, critical: 0, owner: 'Nik.Geo', live: false },
{ id: 'e7', date: '2026-05-21T10:00:00Z', title: 'Rotterdam logistics delta — retro', scenario: 'Port of Rotterdam disruption', status: 'pending', severity: 'MEDIUM', findings: 12, critical: 1, owner: 'Rhea.OSINT', live: false },
{ id: 'e8', date: '2026-05-22T14:00:00Z', title: 'Supply chain — Asia routing (Q2 cadence)', scenario: 'Supply chain — Asia', status: 'pending', severity: 'MEDIUM', findings: 0, critical: 0, owner: 'Mei.Supply', live: false },

// RECENT (completed)
{ id: 'p1', date: '2026-05-18T11:15:00Z', title: 'Insider — R&D quarterly', scenario: 'Insider exfiltration — R&D', status: 'complete', severity: 'MEDIUM', findings: 7, critical: 0, owner: 'Mei.Supply', live: false },
{ id: 'p2', date: '2026-05-15T09:40:00Z', title: 'Pre-merger threat surface', scenario: 'Pre-M&A diligence', status: 'complete', severity: 'HIGH', findings: 14, critical: 2, owner: 'Ava.Cyber', live: false },
{ id: 'p3', date: '2026-05-13T15:20:00Z', title: 'Geopolitical — weekly digest', scenario: 'Baltic critical-infrastructure', status: 'complete', severity: 'MEDIUM', findings: 8, critical: 1, owner: 'Nik.Geo', live: false },
{ id: 'p4', date: '2026-05-11T10:00:00Z', title: 'Vendor breach lookback', scenario: 'Third-party SaaS incident', status: 'complete', severity: 'HIGH', findings: 11, critical: 1, owner: 'Kai.Cyber', live: false }];


// ── helpers ─────────────────────────────────────────────────────────────────
const startOfDay = (d) => {const x = new Date(d);x.setUTCHours(0, 0, 0, 0);return x;};
const dayDelta = (d) => Math.round((startOfDay(d) - startOfDay(NOW)) / 86400000);
const fmtTimeShort = (d) => new Date(d).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: false, timeZone: 'UTC' });
const fmtDateLong = (d) => {
  const dd = dayDelta(d);
  if (dd === 0) return 'Today';
  if (dd === 1) return 'Tomorrow';
  if (dd === -1) return 'Yesterday';
  return new Date(d).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', timeZone: 'UTC' });
};

// ── tokens ──────────────────────────────────────────────────────────────────
const SEV = {
  CRITICAL: { c: '#C0392B' },
  HIGH: { c: '#D68910' },
  MEDIUM: { c: '#2E86AB' },
  LOW: { c: '#27AE60' }
};

const STATUS = {
  pending: { label: 'PENDING', c: '#8A9BB5' },
  round1: { label: 'ROUND 1', c: '#2E86AB' },
  round2: { label: 'ROUND 2', c: '#D68910' },
  review: { label: 'IN REVIEW', c: '#7B2D8B' },
  complete: { label: 'COMPLETE', c: '#27AE60' }
};

function StatusPill({ status, live }) {
  const m = STATUS[status] || STATUS.pending;
  return (
    <span className="font-mono inline-flex items-center gap-1.5 px-2 py-0.5 rounded text-[10px] font-bold tracking-[0.12em]"
    style={{ backgroundColor: `${m.c}14`, color: m.c, border: `1px solid ${m.c}40` }}>
      {live && <span className="pulse-dot" style={{ width: 5, height: 5, borderRadius: '50%', backgroundColor: '#C0392B' }} />}
      {live ? 'LIVE · ' + m.label : m.label}
    </span>);

}

// ── Card chrome ─────────────────────────────────────────────────────────────
function Card({ children, className = '', style = {} }) {
  return (
    <div className={'rounded-md ' + className}
    style={{ backgroundColor: 'var(--wr-bg-card)', border: '1px solid var(--wr-border)', ...style }}>
      {children}
    </div>);

}

// ── EVENT ROW · clickable, elegant ──────────────────────────────────────────
function EventRow({ e, density = 'regular', showScenarios = true, showLivePulse = true }) {
  const isPast = e.status === 'complete';
  const padY = density === 'compact' ? 'py-2.5' : density === 'spacious' ? 'py-5' : 'py-4';
  return (
    <a href={`/sessions/${e.id}`}
    className={`row-link grid items-center gap-4 px-6 ${padY} border-b last:border-0 cursor-pointer`}
    style={{
      gridTemplateColumns: '80px 1fr 130px 110px 130px 18px',
      borderColor: 'var(--wr-border)',
      opacity: isPast ? 0.78 : 1
    }}>
      {/* time */}
      <div>
        <div className="font-mono text-[14px] font-semibold" style={{ color: 'var(--wr-text-primary)' }}>
          {fmtTimeShort(e.date)}
        </div>
        <div className="font-mono text-[9.5px] tracking-[0.12em]" style={{ color: 'var(--wr-text-muted)' }}>
          UTC
        </div>
      </div>

      {/* title + scenario */}
      <div className="min-w-0">
        <div className="flex items-center gap-2.5">
          <span style={{ width: 8, height: 8, borderRadius: '50%', backgroundColor: SEV[e.severity].c, flexShrink: 0 }} />
          <p className="text-[15px] font-semibold leading-snug truncate" style={{ color: 'var(--wr-text-primary)' }}>
            {e.title}
          </p>
          {e.live &&
          <span className={showLivePulse ? "pulse-dot" : ""} style={{ width: 6, height: 6, borderRadius: '50%', backgroundColor: '#C0392B', flexShrink: 0 }} />
          }
        </div>
        {showScenarios && e.scenario &&
        <p className="text-[12px] truncate mt-1 pl-[18px]" style={{ color: 'var(--wr-text-muted)' }}>
            {e.scenario}
          </p>
        }
      </div>

      {/* status */}
      <div className="text-center"><StatusPill status={e.status} live={e.live && showLivePulse} /></div>

      {/* findings */}
      <div className="text-center">
        {e.findings > 0 ?
        <div className="flex items-baseline gap-1.5 justify-center">
            <span className="font-mono text-[15px] font-bold" style={{ color: 'var(--wr-text-primary)' }}>{e.findings}</span>
            <span className="text-[11px]" style={{ color: 'var(--wr-text-muted)' }}>findings</span>
            {e.critical > 0 &&
          <span className="font-mono text-[10px] font-bold ml-1" style={{ color: SEV.CRITICAL.c }}>{e.critical}C</span>
          }
          </div> :

        <span className="font-mono text-[11px]" style={{ color: 'var(--wr-text-muted)' }}>—</span>
        }
      </div>

      {/* owner */}
      <div className="text-center">
        <p className="font-mono text-[12px]" style={{ color: 'var(--wr-text-secondary)' }}>{e.owner}</p>
      </div>

      {/* chevron */}
      <span className="row-chev font-mono text-[14px]" style={{ color: 'var(--wr-text-muted)' }}>→</span>
    </a>);

}

// ── Day group header ────────────────────────────────────────────────────────
function DayGroup({ label, sub, events, density, showScenarios, showLivePulse }) {
  if (events.length === 0) return null;
  return (
    <div>
      <div className="px-6 py-3 flex items-baseline justify-between border-b"
      style={{ borderColor: 'var(--wr-border)', backgroundColor: 'rgba(138,155,181,0.025)' }}>
        <div className="flex items-baseline gap-3">
          <p className="font-mono text-[11px] font-bold tracking-[0.16em]"
          style={{ color: 'var(--wr-text-secondary)' }}>{label}</p>
          {sub && <p className="font-mono text-[10px]" style={{ color: 'var(--wr-text-muted)' }}>{sub}</p>}
        </div>
        <p className="font-mono text-[10px] tracking-[0.1em]" style={{ color: 'var(--wr-text-muted)' }}>
          {events.length} EVENT{events.length === 1 ? '' : 'S'}
        </p>
      </div>
      {events.map((e) => <EventRow key={e.id} e={e} density={density} showScenarios={showScenarios} showLivePulse={showLivePulse} />)}
    </div>);

}

// ── KPI rail ────────────────────────────────────────────────────────────────
function KpiRail({ compact = false }) {
  const kpis = [
  { lab: 'OPEN CRITICAL', v: '7', sub: '+3 / 7d', c: '#C0392B', up: true },
  { lab: 'AVG CONFIDENCE', v: '74%', sub: '+5pp', c: '#27AE60', up: true },
  { lab: 'EVENTS THIS WEEK', v: '7', sub: '−1 / wk', c: '#F0A500', up: false }];

  return (
    <Card>
      <div className="grid" style={{ gridTemplateColumns: 'repeat(3, 1fr)' }}>
        {kpis.map((k, i) =>
        <div key={i} className={compact ? "px-3 py-3" : "px-5 py-5"}
        style={{
          borderRight: i < 2 ? '1px solid var(--wr-border)' : 'none',
          display: 'flex',
          flexDirection: 'column',
        }}>
            <p className="font-mono text-[10px] font-bold tracking-[0.16em]"
              style={{ color: 'var(--wr-text-muted)', textAlign: "center", minHeight: 32, display: 'flex', alignItems: 'flex-start', justifyContent: 'center' }}>{k.lab}</p>
            <p className="text-[34px] font-bold tracking-[-0.02em] leading-none"
              style={{ color: k.c, textAlign: "center", minHeight: 42, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{k.v}</p>
            <p className="font-mono text-[10.5px] mt-2"
              style={{ color: k.up ? 'var(--wr-low)' : 'var(--wr-text-muted)', textAlign: "center" }}>{k.sub}</p>
          </div>
        )}
      </div>
    </Card>);

}

// ── Workflow pipeline ───────────────────────────────────────────────────────
function Pipeline({ events, sizing = 'equal' }) {
  const stages = [
  { k: 'pending', label: 'PENDING', c: STATUS.pending.c },
  { k: 'round1', label: 'ROUND 1', c: STATUS.round1.c },
  { k: 'round2', label: 'ROUND 2', c: STATUS.round2.c },
  { k: 'review', label: 'REVIEW', c: STATUS.review.c },
  { k: 'complete', label: 'COMPLETE', c: STATUS.complete.c }];

  const counts = stages.map((s) => events.filter((e) => e.status === s.k).length);
  const total = counts.reduce((a, b) => a + b, 0) || 1;

  return (
    <Card>
      <div className="px-5 pt-5 pb-2 flex items-baseline justify-between">
        <p className="font-mono text-[10px] font-bold tracking-[0.16em]" style={{ color: 'var(--wr-text-muted)' }}>
          WORKFLOW STATE
        </p>
        <p className="font-mono text-[10px]" style={{ color: 'var(--wr-text-muted)' }}>
          {total} TOTAL
        </p>
      </div>
      <div className="px-5 pb-5">
        <div className="flex items-stretch gap-1.5">
          {stages.map((s, i) =>
          <div key={s.k} className="px-3 py-3 rounded-sm min-w-0"
          style={{
            flex: sizing === 'proportional'
              ? `${Math.max(0.65, counts[i] / Math.max(1, Math.max(...counts)))} 1 0`
              : '1 1 0',
            backgroundColor: `${s.c}16`,
            border: `1px solid ${s.c}44`, fontWeight: "700"
          }}>
              <p className="font-mono text-[9px] font-bold tracking-[0.12em]" style={{ color: s.c, textAlign: "center" }}>{s.label}</p>
              <p className="font-mono text-[22px] font-bold mt-1 leading-none" style={{ color: 'var(--wr-text-primary)', textAlign: "center" }}>{counts[i]}</p>
            </div>
          )}
        </div>
      </div>
    </Card>);

}

// ── Top bar ─────────────────────────────────────────────────────────────────
function TopBar({ filter, setFilter }) {
  const filters = ['ALL', 'IN PROGRESS', 'COMPLETE'];
  return (
    <div className="flex items-center justify-between px-6 py-4 border-b"
    style={{ borderColor: 'var(--wr-border)', backgroundColor: 'var(--wr-bg-primary)' }}>
      <div className="flex items-center gap-3">
        <div className="w-9 h-9 rounded flex items-center justify-center"
        style={{ backgroundColor: 'rgba(240,165,0,0.1)', border: '1px solid rgba(240,165,0,0.2)' }}>
          <span style={{ color: 'var(--wr-amber)', fontFamily: 'JetBrains Mono', fontWeight: 700 }}>▣</span>
        </div>
        <div>
          <h1 className="text-[17px] font-bold tracking-[0.04em] font-mono" style={{ color: 'var(--wr-text-primary)' }}>
            Dashboard
          </h1>
          <p className="text-[11px] mt-0.5" style={{ color: 'var(--wr-text-muted)' }}>
            Tuesday, May 19, 2026 · 09:30 UTC · workspace <span className="font-mono" style={{ color: 'var(--wr-text-secondary)' }}>intel-primary</span>
          </p>
        </div>
      </div>
      <div className="flex items-center gap-2">
        <div className="flex items-center rounded overflow-hidden" style={{ border: '1px solid var(--wr-border)' }}>
          {filters.map((r) =>
          <button key={r} onClick={() => setFilter(r)}
          className="font-mono text-[10.5px] font-bold tracking-[0.08em] px-2.5 py-1.5 transition-all"
          style={{
            color: filter === r ? 'var(--wr-amber)' : 'var(--wr-text-muted)',
            backgroundColor: filter === r ? 'rgba(240,165,0,0.1)' : 'transparent'
          }}>{r}</button>
          )}
        </div>
        <div className="flex items-center gap-1.5 px-2.5 py-1.5 rounded text-xs"
        style={{ border: '1px solid var(--wr-border)', color: 'var(--wr-text-secondary)' }}>
          <span className="font-mono" style={{ fontSize: 11 }}>⌕</span>
          <input placeholder="Search events, scenarios, owners…"
          className="bg-transparent outline-none text-xs"
          style={{ width: 220, color: 'var(--wr-text-primary)' }} />
        </div>
        <button className="px-3 py-1.5 rounded text-sm font-semibold"
        style={{ backgroundColor: 'var(--wr-amber)', color: '#0D1B2A' }}>
          + New event
        </button>
      </div>
    </div>);

}

// ── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [filter, setFilter] = useState('ALL');
  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    document.documentElement.style.setProperty('--wr-amber', t.accent);
  }, [t.accent]);

  const filtered = useMemo(() => {
    if (filter === 'IN PROGRESS') return EVENTS.filter((e) => e.status !== 'complete');
    if (filter === 'COMPLETE') return EVENTS.filter((e) => e.status === 'complete');
    return EVENTS;
  }, [filter]);

  const groups = useMemo(() => {
    const today = filtered.filter((e) => dayDelta(e.date) === 0).sort((a, b) => new Date(a.date) - new Date(b.date));
    const upcoming = filtered.filter((e) => dayDelta(e.date) > 0).sort((a, b) => new Date(a.date) - new Date(b.date));
    const recent = filtered.filter((e) => dayDelta(e.date) < 0).sort((a, b) => new Date(b.date) - new Date(a.date));
    return { today, upcoming, recent };
  }, [filtered]);

  return (
    <div className="min-h-screen" style={{ backgroundColor: 'var(--wr-bg-primary)' }}>
      <Sidebar />
      <div style={{ marginLeft: 224 }}>
        <TopBar filter={filter} setFilter={setFilter} />

        <div className="px-6 py-6 max-w-[1280px] mx-auto space-y-5">

          {/* KPI + WORKFLOW row */}
          <div className="grid gap-5" style={{ gridTemplateColumns: '1fr 1.05fr' }}>
            <KpiRail compact={t.compactKpis} />
            <Pipeline events={EVENTS} sizing={t.pipelineSizing} />
          </div>

          {/* EVENTS list */}
          <Card>
            <div className="px-6 py-4 flex items-baseline justify-between border-b"
            style={{ borderColor: 'var(--wr-border)' }}>
              <div>
                <p className="font-mono text-[10px] font-bold tracking-[0.16em]" style={{ color: 'var(--wr-amber)' }}>
                  EVENTS
                </p>
                <p className="text-[16px] font-semibold mt-1" style={{ color: 'var(--wr-text-primary)' }}>
                  {filtered.length} {filter === 'COMPLETE' ? 'completed' : filter === 'IN PROGRESS' ? 'in progress' : 'total'} · sorted by date
                </p>
              </div>
              <a href="#" className="font-mono text-[10px] font-bold tracking-[0.14em]" style={{ color: 'var(--wr-amber)' }}>
                ALL SESSIONS →
              </a>
            </div>

            {/* column labels */}
            <div className="grid gap-4 px-6 py-2 border-b"
            style={{
              gridTemplateColumns: '80px 1fr 130px 110px 130px 18px',
              borderColor: 'var(--wr-border)',
              backgroundColor: 'rgba(138,155,181,0.03)'
            }}>
              {['TIME', 'EVENT', 'STATUS', 'FINDINGS', 'OWNER', ''].map((h, i) =>
              <span key={i} className="text-[10px] font-mono font-bold tracking-[0.14em]"
              style={{ color: 'var(--wr-text-muted)', textAlign: 'center' }}>{h}</span>
              )}
            </div>

            <DayGroup label="TODAY"    sub="TUE · MAY 19" events={groups.today}    density={t.density} showScenarios={t.showScenarios} showLivePulse={t.showLivePulse} />
            <DayGroup label="UPCOMING" sub="NEXT 7 DAYS"  events={groups.upcoming} density={t.density} showScenarios={t.showScenarios} showLivePulse={t.showLivePulse} />
            <DayGroup label="RECENT"   sub="LAST 14 DAYS" events={groups.recent}   density={t.density} showScenarios={t.showScenarios} showLivePulse={t.showLivePulse} />

            {filtered.length === 0 &&
            <div className="px-6 py-16 text-center">
                <p className="font-mono text-[11px] tracking-[0.14em]" style={{ color: 'var(--wr-text-muted)' }}>
                  NO EVENTS MATCH THIS FILTER
                </p>
              </div>
            }
          </Card>

        </div>
      </div>

      {/* ── Tweaks panel ─────────────────────────────────────────────────── */}
      <window.TweaksPanel title="Dashboard tweaks">
        <window.TweakSection label="Layout" />
        <window.TweakRadio  label="Row density"     value={t.density}
                            options={['compact','regular','spacious']}
                            onChange={(v) => setTweak('density', v)} />
        <window.TweakRadio  label="Pipeline boxes"  value={t.pipelineSizing}
                            options={[{value:'equal',label:'equal'},{value:'proportional',label:'by count'}]}
                            onChange={(v) => setTweak('pipelineSizing', v)} />
        <window.TweakToggle label="Compact KPI rail" value={t.compactKpis}
                            onChange={(v) => setTweak('compactKpis', v)} />

        <window.TweakSection label="Content" />
        <window.TweakToggle label="Show scenario subtitle" value={t.showScenarios}
                            onChange={(v) => setTweak('showScenarios', v)} />
        <window.TweakToggle label="Live pulse animation"   value={t.showLivePulse}
                            onChange={(v) => setTweak('showLivePulse', v)} />

        <window.TweakSection label="Theme" />
        <window.TweakColor  label="Accent color" value={t.accent}
                            onChange={(v) => setTweak('accent', v)} />
      </window.TweaksPanel>
    </div>);

}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
